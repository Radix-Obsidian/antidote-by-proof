<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antidote</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="apple-touch-icon" href="/static/logo.png">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <!-- Splash screen -->
    <div id="splash" class="splash">
        <img src="/static/logo.png" alt="Antidote by PROOF" class="splash-logo">
    </div>

    <!-- Ambient glow -->
    <div class="ambient-glow"></div>

    <!-- Nav -->
    <nav>
        <div class="nav-brand">
            <img src="/static/logo.png" alt="Antidote" class="nav-logo">
            <span class="nav-title">Antidote</span>
        </div>
        <div class="nav-status" id="health-badge">
            <span class="status-dot" id="health-dot"></span>
            <span id="health-text">Connecting</span>
        </div>
    </nav>

    <main>
        <!-- Hero scan -->
        <section class="scan-hero">
            <img src="/static/logo.png" alt="" class="hero-logo">
            <h1 class="hero-title">Scan your codebase</h1>
            <p class="hero-sub">Deterministic auth-gap detection for Python web frameworks</p>
            <div class="scan-bar">
                <svg class="scan-icon" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
                </svg>
                <input
                    id="scan-target"
                    type="text"
                    placeholder="Enter a file or directory path..."
                    autocomplete="off"
                    spellcheck="false"
                >
                <button id="scan-btn" onclick="runScan()">
                    <span class="btn-label">Scan</span>
                    <span class="btn-spinner hidden"></span>
                </button>
            </div>
            <p id="scan-status" class="scan-status hidden"></p>
        </section>

        <!-- Metrics bento -->
        <section class="metrics">
            <div class="metric-card">
                <span class="metric-value" id="stat-findings">&mdash;</span>
                <span class="metric-label">Findings</span>
            </div>
            <div class="metric-card">
                <span class="metric-value" id="stat-files">&mdash;</span>
                <span class="metric-label">Files scanned</span>
            </div>
            <div class="metric-card">
                <span class="metric-value" id="stat-backend">&mdash;</span>
                <span class="metric-label">AI backend</span>
            </div>
            <div class="metric-card">
                <span class="metric-value" id="stat-latency">&mdash;</span>
                <span class="metric-label">Avg latency</span>
            </div>
        </section>

        <!-- Findings -->
        <section class="findings-section">
            <div class="section-header">
                <h2>Findings</h2>
                <button class="ghost-btn" onclick="loadFindings()">Refresh</button>
            </div>
            <div id="findings-body" class="findings-list">
                <div class="empty-state">Run a scan to surface unprotected routes.</div>
            </div>
        </section>

        <!-- AI Status -->
        <section class="ai-section">
            <div class="section-header">
                <h2>Inference</h2>
            </div>
            <div id="ai-status" class="ai-grid">
                <div class="ai-placeholder">Loading...</div>
            </div>
        </section>
    </main>

    <!-- Patch modal -->
    <div id="patch-modal" class="modal-overlay hidden" onclick="closePatch(event)">
        <div class="modal-panel" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="patch-title">Patch</h3>
                <button class="modal-close" onclick="closePatch()">&times;</button>
            </div>
            <pre id="patch-content" class="modal-code"></pre>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
