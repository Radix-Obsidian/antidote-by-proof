services:
  antidote:
    build: .
    ports:
      - "8740:8740"
    volumes:
      - ./src:/src
      - ./events:/events/antidote
      - ./antidote.yaml:/app/antidote.yaml:ro
    environment:
      - ANTIDOTE_EVENT_DIR=/events/antidote
      - ANTIDOTE_BACKEND=ollama
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8740/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
